apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
spec:
  replicas: 2
  template:
    spec:
      serviceAccountName: team-a
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.11.0 # {"$imagepolicy": "flux-system:podinfo-latest"}
          env:
            - name: PODINFO_UI_MESSAGE
              value: "Progressive rollout 2026-03-05"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
