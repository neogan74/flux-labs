apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: flagger
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flux-system
  targetNamespace: flux-system
  values:
    crd:
      create: true
    metricsServer: http://kube-prometheus-stack-prometheus.monitoring:9090
    meshProvider: nginx
