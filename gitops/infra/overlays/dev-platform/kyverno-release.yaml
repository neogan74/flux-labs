apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kyverno
      version: "3.*"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  targetNamespace: kyverno
  install:
    createNamespace: true
