apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-platform-controllers
  namespace: flux-system
spec:
  interval: 1m
  path: ./gitops/infra/controllers/dev
  prune: true
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: flux-system
