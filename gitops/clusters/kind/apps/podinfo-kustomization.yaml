apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-app-podinfo
  namespace: flux-system
spec:
  interval: 1m
  path: ./gitops/apps/podinfo/overlays/dev
  prune: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: dev
  dependsOn:
    - name: dev-infra
