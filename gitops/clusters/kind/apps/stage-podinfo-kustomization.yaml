apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stage-app-podinfo
  namespace: flux-system
spec:
  interval: 2m
  path: ./gitops/apps/podinfo/overlays/stage
  prune: true
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: stage
  dependsOn:
    - name: stage-infra
