apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo-imagepolicy
  namespace: flux-system
spec:
  interval: 1m
  path: ./gitops/apps/podinfo/automation/dev
  prune: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: flux-system
